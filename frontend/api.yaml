openapi: 3.0.3
info:
  title: TSP Solver API
  version: 1.0.0
  description: API for managing and solving Travelling Salesman Problems

servers:
  - url: /api/v1

paths:

  /info:
    get:
      summary: Get backend information
      responses:
        '200':
          description: System info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemInfo'

  /algorithms:
    get:
      summary: Get available algorithms
      responses:
        '200':
          description: List of algorithms
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Algorithm'

  /problems/tsplib:
    get:
      summary: List TSPLIB problems
      responses:
        '200':
          description: List of problems
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProblemSummary'

  /problems/{problemId}:
    get:
      summary: Get problem details
      parameters:
        - name: problemId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Problem details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
        '404':
          $ref: '#/components/responses/ErrorResponse'

  /problems:
    post:
      summary: Create custom problem
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProblemRequest'
      responses:
        '200':
          description: Problem created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemCreatedResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'

  /problems/upload:
    post:
      summary: Upload problem file
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Upload success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemCreatedResponse'

  /solver/start:
    post:
      summary: Start solver
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SolveRequest'
      responses:
        '200':
          description: Solver started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SolverStartResponse'
        '409':
          description: Solver already running
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /solver/status:
    get:
      summary: Get solver status
      responses:
        '200':
          description: Current solver status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SolverStatus'

  /solver/result:
    get:
      summary: Get solver result
      responses:
        '200':
          description: Solver result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Solution'
        '404':
          $ref: '#/components/responses/ErrorResponse'

  /solver/cancel:
    post:
      summary: Cancel running solver
      responses:
        '200':
          description: Solver cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericMessage'

  /processing/cancel:
    post:
      summary: Cancel currently running backend processing
      responses:
        '200':
          description: Cancellation requested
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericMessage'

components:

  responses:
    ErrorResponse:
      description: Error response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:

    SystemInfo:
      type: object
      properties:
        name:
          type: string
        version:
          type: string
        apiVersion:
          type: string

    Algorithm:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        parameters:
          type: array
          items:
            $ref: '#/components/schemas/AlgorithmParameter'

    AlgorithmParameter:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
        required:
          type: boolean
        default:
          nullable: true

    ProblemSummary:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        nodeCount:
          type: integer
        edgeWeightType:
          type: string

    ProblemType:
      type: string
      description: Defines whether the TSP is symmetric or asymmetric
      enum:
      - symmetric
      - asymmetric

    Problem:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        problemType:
          $ref: '#/components/schemas/ProblemType'
        source:
          type: string
        nodeCount:
          type: integer
        edgeWeightType:
          type: string
        nodes:
          type: array
          items:
            $ref: '#/components/schemas/Node'
        adjacencyMatrix:
            $ref: '#/components/schemas/AdjacencyMatrix'
        metadata:
          type: object
          additionalProperties: true

    AdjacencyMatrix:
      type: array
      description: Distance or cost matrix. matrix[i][j] contains the cost from node i to node j.
      items:
        type: array
        items:
          type: number
          nullable: true

    Node:
      type: object
      properties:
        id:
          type: integer
        x:
          type: number
        y:
          type: number
        name:
          type: string
          nullable: true

    CreateProblemRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        problemType:
          $ref: '#/components/schemas/ProblemType'
        edgeWeightType:
          type: string
          description: Defines how distances are calculated. Use EXPLICIT when adjacencyMatrix is provided.
        nodes:
          type: array
          items:
            $ref: '#/components/schemas/Node'
        adjacencyMatrix:
          $ref: '#/components/schemas/AdjacencyMatrix'
          nullable: true

    ProblemCreatedResponse:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        nodeCount:
          type: integer
        status:
          type: string

    SolveRequest:
      type: object
      required:
        - problemId
        - algorithmId
      properties:
        problemId:
          type: string
        algorithmId:
          type: string
        parameters:
          type: object
          additionalProperties: true

    SolverStartResponse:
      type: object
      properties:
        jobId:
          type: string
        status:
          type: string
        message:
          type: string

    SolverStatus:
      type: object
      properties:
        jobId:
          type: string
        status:
          type: string
          enum: [idle, running, finished, failed, cancelled]
        progress:
          type: number
          minimum: 0
          maximum: 1
        currentIteration:
          type: integer
          nullable: true
        maxIterations:
          type: integer
          nullable: true
        bestDistance:
          type: number
          nullable: true
        elapsedMs:
          type: integer
        solutionId:
          type: string
          nullable: true

    Solution:
      type: object
      properties:
        problemId:
          type: string
        algorithmId:
          type: string
        tour:
          type: array
          items:
            type: integer
        totalDistance:
          type: number
        runtimeMs:
          type: integer
        status:
          type: string

    GenericMessage:
      type: object
      properties:
        status:
          type: string
        message:
          type: string

    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
              additionalProperties: true
